# =============================================================================
#  biosim4.ini  ·  predator-prey coevolution config
# =============================================================================
#
# This file is split into TWO sections:
#
#   ┌─────────────────────────────────────────────────────────────────────┐
#   │  SECTION A — EXPERIMENT MATRIX                                      │
#   │                                                                     │
#   │  The four knobs you should systematically vary:                     │
#   │     1. environment   → challenge                                    │
#   │     2. size          → predatorFraction (population balance)        │
#   │     3. speed         → predatorActionPeriod / preyActionPeriod      │
#   │     4. starvation    → predatorStarvationSteps                      │
#   │                                                                     │
#   │  Use tools/run_sweep.sh to sweep across these.                      │
#   └─────────────────────────────────────────────────────────────────────┘
#
#   ┌─────────────────────────────────────────────────────────────────────┐
#   │  SECTION B — INFRASTRUCTURE                                         │
#   │                                                                     │
#   │  Population, world size, mutation rate, video output, etc.          │
#   │  Usually you don't need to touch these.                             │
#   └─────────────────────────────────────────────────────────────────────┘
#
# =============================================================================


# =============================================================================
#  SECTION A · EXPERIMENT MATRIX
# =============================================================================

# ── master toggle ───────────────────────────────────────────────────────────
# predatorPreyEnabled
#   true  = two species (predator + prey) coevolve
#   false = baseline single-species challenge mode (all are prey)
#
# Use false for CONTROL runs and true for TREATMENT runs.
# Important: this switch is independent of `challenge`.
#            (challenge controls environment geometry, not whether species split exists)
predatorPreyEnabled = true


# ── 1. ENVIRONMENT ──────────────────────────────────────────────────────────
# challenge
#   Controls prey's environmental objective (arena geometry / target behavior).
#   Predators are selected by captures; prey are selected by challenge survival.
#   So this knob changes prey ecological constraints while keeping predation active.
#
# Typical interpretation:
#   challenge=20 (open arena): "pure" predator-prey dynamics (closest to LV setup)
#   challenge!=20             : predator-prey plus extra spatial/environment pressure
#
# Suggested sweep for thesis:
#   20 (open), 0 (circle), 5 (corner), 11 (wall)
#   0  = circle              5  = corner 1/4 radius
#   1  = right half          7  = migrate distance
#   2  = right quarter       9  = left eighth
#   3  = neighbor count     11  = against any wall
#   4  = center weighted    13  = east-west eighths
#  20  = open arena (no extra constraint)  ← classical Lotka-Volterra
challenge = 20


# ── 2. SIZE  (population balance) ───────────────────────────────────────────
# predatorFraction  (0.0 .. 1.0)
#   Fraction of total population spawned as predators.
#   If predatorRatioMode=0: used every generation (fixed ratio).
#   If predatorRatioMode=1: used only at gen 0, then ratio evolves by fitness.
#
# Practical ranges:
#   0.20-0.35 often gives easier predator bootstrap
#   0.50 can be harsh early (many predators competing before they can hunt)
predatorFraction = 0.5


# ── 3. SPEED  (per-species action stride) ───────────────────────────────────
# predatorActionPeriod / preyActionPeriod  (integers >= 1)
#   Each species evaluates NN and executes actions every Nth simStep.
#   1  = full speed (acts every step)
#   2  = half speed
#   3  = third speed, ...
#
# IMPORTANT:
#   Age and starvation timers still tick every step.
#   So larger N means fewer action opportunities before death/reproduction.
#
# Interpretation:
#   predatorActionPeriod < preyActionPeriod  -> predator advantage
#   predatorActionPeriod > preyActionPeriod  -> prey advantage
predatorActionPeriod = 1
preyActionPeriod     = 1


# ── 4. STARVATION ───────────────────────────────────────────────────────────
# predatorStarvationSteps (integer >= 0)
#   If 0: starvation OFF (predators only die from other causes).
#   If >0: each predator has a starvation deadline; if no kill before deadline,
#          predator dies in-generation. Deadline is reset forward after each kill.
#
# This is the key negative feedback term:
#   fewer prey -> fewer predator kills -> more predator starvation deaths.
#
# predatorStarvationGrace (integer >= 0)
#   Warm-up steps at generation start before starvation can occur.
#
# Practical guidance:
#   low values (40-100): strong pressure, many predator deaths
#   medium (120-220): balanced pressure
#   high values (300+): weak pressure, closer to no-starvation behavior
predatorStarvationSteps = 400
predatorStarvationGrace = 40


# ── secondary predator-prey knobs ───────────────────────────────────────────
# predatorRatioMode:
#   0 = fixed.  Every gen spawns round(predatorFraction * pop) predators.
#   1 = proportional.  Next gen's predator fraction is driven by the
#       relative fitness of each species in the just-finished generation,
#       clamped to [predatorRatioFloor, predatorRatioCeil].
# Recommended workflow:
#   - start with mode 0 for predator bootstrap (e.g. first 100-500 generations)
#   - then switch to mode 1 to allow ecological ratio feedback and oscillations
#   - use generation updates: predatorRatioMode@<gen> = 1
predatorRatioMode  = 0
# predatorRatioMode@200 = 1        # example: switch at generation 200

# predatorRatioFloor / predatorRatioCeil  (0..1)
#   Hard lower/upper bounds on predator fraction in proportional mode.
#   Prevents collapse to exactly 0 predators or 100% predators.
#   Narrow bounds = less volatility; wide bounds = more dramatic swings.
predatorRatioFloor = 0.10
predatorRatioCeil  = 0.90

# predatorRatioGain (>0)
#   Sensitivity of ratio update to relative fitness imbalance.
#   1.0  = mild response
#   >1.0 = stronger response, larger ratio shifts
#   <1.0 = damped response
predatorRatioGain  = 1.5

# predatorMinCapturesToReproduce (integer >= 0)
#   Predator must make at least this many kills to be reproduction-eligible.
#   0 = any predator can reproduce; >0 enforces hunting competence.
predatorMinCapturesToReproduce = 1

# predatorCaptureNorm (integer > 0)
#   Number of captures that maps predator fitness to 1.0.
#   Example: norm=5 means 5+ captures gives maximal score for selection scaling.
predatorCaptureNorm            = 5

# predatorPreyPerceptionRadius (>0, world units)
#   Radius used by species-specific proximity sensors (PrD/PyD related behavior).
#   Larger values make opponents "visible" from farther away.
predatorPreyPerceptionRadius   = 6.0

# preyTopFractionToReproduce (0..1]
#   Fraction of eligible prey parents kept after sorting by prey fitness.
#   Lower values increase selection pressure on prey; higher values preserve diversity.
preyTopFractionToReproduce     = 0.7



# =============================================================================
#  SECTION B · INFRASTRUCTURE  (rarely changed)
# =============================================================================

# ── threading & world ───────────────────────────────────────────────────────
numThreads = 16
sizeX = 128
sizeY = 128
population         = 500
stepsPerGeneration = 500
maxGenerations     = 3000

# ── genome & neural net ─────────────────────────────────────────────────────
genomeInitialLengthMin     = 14
genomeInitialLengthMax     = 14
genomeMaxLength            = 300
maxNumberNeurons           = 3
pointMutationRate          = 0.01
geneInsertionDeletionRate  = 0.0
deletionRatio              = 0.5

# ── selection & reproduction ────────────────────────────────────────────────
killEnable             = true
sexualReproduction     = false
chooseParentsByFitness = true

# ── responsiveness / sensors ────────────────────────────────────────────────
responsiveness               = 0.5
responsivenessCurveKFactor   = 2
populationSensorRadius       = 2.5
longProbeDistance            = 16
shortProbeBarrierDistance    = 4
valenceSaturationMag         = 0.5
signalSensorRadius           = 2.0
signalLayers                 = 1

# ── output paths ────────────────────────────────────────────────────────────
imageDir = Output/Videos
logDir   = Output/Logs

# ── render & video ──────────────────────────────────────────────────────────
displayScale          = 8
uiScale               = 1.5
agentSize             = 4
videoSaveFirstFrames  = 2
saveVideo             = true
videoStride           = 1

# ── auxiliary logs / NN snapshots ───────────────────────────────────────────
updateGraphLog                    = true
updateGraphLogStride              = videoStride
genomeAnalysisStride              = videoStride
genomeComparisonMethod            = 1
displaySampleGenomes              = 5
autoSavePredatorNetsPerGeneration = 0
autoSavePreyNetsPerGeneration     = 0
autoSaveNetEpochs                 = 1000
autoSaveNetStride                 = 10

# ── arena barriers ──────────────────────────────────────────────────────────
# 0 = none, 1 = vertical bar (fixed), 3 = five staggered bars,
# 4 = horizontal bar (north), 5 = floating islands, 6 = sequence of spots
barrierType = 0

# ── RNG ─────────────────────────────────────────────────────────────────────
deterministic = false
RNGSeed       = 12345678

autoSave = false
